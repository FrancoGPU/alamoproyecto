spring.application.name=asistencia-alamo

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/sistema_alquiler?createDatabaseIfNotExist=true
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


server.servlet.session.cookie.same-site=lax

file.base-dir=/root/asistencia/uploads

# CORS (Vite)
# Si tu Vite corre en otro puerto, cambia este valor.
cors.allowed-origin=http://localhost:5173


spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
